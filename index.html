<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cyber Event Reports</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel2:#1e2632; --line:#2a3340;
    --ink:#e6edf3; --mut:#9fb0c0; --accent:#4ea1ff; --warn:#ffb454; --good:#54d18c; --bad:#ff7b72;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  a{color:#79c0ff;text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:34px 22px 80px}
  .mast{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:8px}
  .mast .badge{display:inline-block;background:#13243a;color:#79c0ff;border:1px solid #234a7a;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:.5px}
  .mast h1{margin:12px 0 6px;font-size:30px;line-height:1.15}
  .mast .svc{display:inline-flex;align-items:center;gap:8px;margin:10px 0 2px;font-size:12.5px;color:var(--mut);background:#10261c;border:1px solid #1f4633;border-radius:8px;padding:6px 12px}
  .mast .svc b{color:var(--good)} .mast .svc .dot{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;flex:0 0 auto}
  .mast .tag{color:var(--mut);font-size:15px;max-width:700px;margin-top:10px}
  .mast .how{color:var(--mut);font-size:12.5px;margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 13px}
  .mast .how b{color:#cfe9d9}
  .shd{display:flex;align-items:center;gap:10px;margin:28px 0 14px;flex-wrap:wrap}
  .shd h2{margin:0;font-size:19px}
  .shd .c{color:var(--mut);font-size:13px}
  .shd .line{flex:1;height:1px;background:var(--line);min-width:20px}
  /* controls */
  .controls{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .controls .grp{display:flex;align-items:center;gap:7px}
  .controls label{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  .controls select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px}
  .fbtn{background:var(--panel2);color:var(--mut);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer}
  .fbtn.on{background:var(--accent);color:#04121f;border-color:var(--accent);font-weight:600}
  /* report cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:17px 19px;transition:border-color .12s}
  a.card:hover{border-color:var(--accent)}
  .card .ch{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .card .ch h3{margin:0;font-size:16.5px;color:var(--ink);flex:1 1 100%;line-height:1.25}
  .card .date{color:var(--mut);font-size:12px}
  .pill{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;border-radius:5px;padding:2px 8px}
  .pill.reviewed{background:#10261c;color:var(--good);border:1px solid #1f4633}
  .pill.draft{background:#3a2a12;color:var(--warn);border:1px solid #5a4220}
  .sevtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-radius:5px;padding:2px 7px}
  .sev-low{background:#10331f;color:#54d18c;border:1px solid #1f5a36}
  .sev-medium{background:#3a2a12;color:#ffb454;border:1px solid #5a4220}
  .sev-high{background:#332316;color:#ffa657;border:1px solid #5e4220}
  .sev-critical{background:#3a1518;color:#ff7b72;border:1px solid #5a2024}
  .card .sum{color:#d6e2ee;font-size:13.5px;flex:1}
  .card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .card .tg{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11px;color:#adbac7}
  .card .rev{color:var(--good);font-size:11.5px;margin-top:10px}
  .card .rev b{color:#cfe9d9}
  .card .go{color:var(--accent);font-size:13px;font-weight:600;margin-top:11px}
  .sevline{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;align-items:center}
  .sevline .lbl{color:var(--mut);font-size:11px}
  /* pagination */
  .pager{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:18px}
  .pager button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pinfo{color:var(--mut);font-size:13px}
  /* detected */
  .detected{display:grid;gap:9px}
  .drow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 15px;border-left:3px solid #8b949e}
  .drow.inprogress{border-left-color:var(--accent)}
  .drow .dname{font-weight:600;font-size:14.5px}
  .drow .dvec{color:var(--mut);font-size:13px;margin-top:3px}
  .drow .dvec b{color:#adbac7}
  .dstat{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;border-radius:5px;padding:3px 9px;white-space:nowrap;align-self:center}
  .dstat.prog{background:#13243a;color:#79c0ff;border:1px solid #234a7a}
  .dstat.det{background:#23292f;color:#aab6c2;border:1px solid #34404a}
  .dstat.trk{background:#1d1630;color:#d2a8ff;border:1px solid #3a2a5a}
  .empty{color:var(--mut);font-style:italic;background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:16px;text-align:center}
  footer{color:var(--mut);font-size:12px;margin-top:30px;border-top:1px solid var(--line);padding-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap" id="app">Loading…</div>
<script>
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const PAGE_SIZE=9;
const SEV_RANK={critical:4,high:3,medium:2,low:1};
let MODEL=null, sortKey='recent', statusFilter='all', page=1;

const TAGLINE="Multi-source, knowledge-graph event reports on cloud-platform and SaaS-supply-chain security incidents. Each report relates many sources into one event, tiers them by reliability, reconciles conflicting claims, and records adjudicated false alarms — what is NOT part of the event is first-class.";
const HOW="<b>How to read these:</b> every report is machine-assembled from a multi-source harvest, fact-checked claim-by-claim, then signed off by a named human reviewer with relevant expertise. The reviewer banner at the top of each report says who vetted it and why they're qualified. AI assigns a baseline severity; each expert may re-assess from their domain point of view.";

function sevTag(tier,who){
  if(!tier) return '';
  return `<span class="sevtag sev-${esc(String(tier).toLowerCase())}" title="${esc(who)} severity">${esc(tier)}</span>`;
}
function reportCard(r){
  const pill = r.status==='reviewed' ? `<span class="pill reviewed">✓ Human-reviewed</span>` : `<span class="pill draft">Draft</span>`;
  const tags=(r.tags||[]).slice(0,5).map(t=>`<span class="tg">${esc(t)}</span>`).join('');
  const rev = r.reviewer ? `<div class="rev">✓ Reviewed by <b>${esc(r.reviewer)}</b>${r.reviewer_expertise?` — ${esc(r.reviewer_expertise)}`:''}</div>`:'';
  const sev = (r.severity_ai||r.severity_expert) ? `<div class="sevline"><span class="lbl">Severity</span>${sevTag(r.severity_ai,'AI')}<span class="lbl">AI</span>${r.severity_expert?sevTag(r.severity_expert,'Expert')+'<span class="lbl">expert</span>':''}</div>`:'';
  return `<a class="card" href="${esc(r.href)}">
      <div class="ch"><h3>${esc(r.title)}</h3>${pill}<span class="date">${esc(r.date_range||'')}</span></div>
      <div class="sum">${esc(r.summary)}</div>
      ${sev}
      ${tags?`<div class="tags">${tags}</div>`:''}
      ${rev}
      <div class="go">Read report →</div>
    </a>`;
}
function detectedRow(d){
  const stat=d.kind||d.status||'detected';
  const cls = /progress/.test(stat)?'prog' : /track/.test(stat)?'trk' : 'det';
  const rowcls = /progress/.test(stat)?'inprogress':'';
  return `<div class="drow ${rowcls}">
      <div><div class="dname">${esc(d.title||d.name)}</div><div class="dvec"><b>Vector:</b> ${esc(d.vector||'')}</div></div>
      <span class="dstat ${cls}">${esc(stat)}</span>
    </div>`;
}
function sortReports(list){
  const arr=list.slice();
  if(sortKey==='impact') arr.sort((a,b)=>(SEV_RANK[String(b.severity_expert||b.severity_ai||'').toLowerCase()]||0)-(SEV_RANK[String(a.severity_expert||a.severity_ai||'').toLowerCase()]||0) || String(b.sort_recent||'').localeCompare(String(a.sort_recent||'')));
  else if(sortKey==='reviewed') arr.sort((a,b)=>((a.status==='reviewed')?0:1)-((b.status==='reviewed')?0:1) || String(b.sort_recent||'').localeCompare(String(a.sort_recent||'')));
  else arr.sort((a,b)=>String(b.sort_recent||'').localeCompare(String(a.sort_recent||'')));
  return arr;
}
function render(){
  const ev=MODEL.events||[];
  const reportsAll=ev.filter(e=>e.status!=='detected');
  const detected=ev.filter(e=>e.status==='detected');
  let reports=reportsAll;
  if(statusFilter!=='all') reports=reports.filter(r=>r.status===statusFilter);
  reports=sortReports(reports);
  const pages=Math.max(1,Math.ceil(reports.length/PAGE_SIZE));
  if(page>pages) page=pages;
  const slice=reports.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const statuses=['all',...[...new Set(reportsAll.map(r=>r.status))]];
  document.getElementById('app').innerHTML=`
    <div class="mast">
      <span class="badge">CYBER NEWSWIRE · v0 demo</span>
      <h1>Cyber Event Reports</h1>
      ${MODEL.service_start?`<div class="svc"><span class="dot"></span>Service start date: <b>${esc(MODEL.service_start)}</b> · standing up in real time — reports and detections are being added as we build.</div>`:''}
      <div class="tag">${esc(TAGLINE)}</div>
      <div class="how">${HOW}</div>
    </div>

    <div class="shd"><h2>Reports</h2><span class="c">${reports.length}</span><span class="line"></span></div>
    <div class="controls">
      <div class="grp"><label>Sort</label>
        <select id="sortSel">
          <option value="recent"${sortKey==='recent'?' selected':''}>Most recent</option>
          <option value="impact"${sortKey==='impact'?' selected':''}>Most impactful</option>
          <option value="reviewed"${sortKey==='reviewed'?' selected':''}>Recently reviewed</option>
        </select>
      </div>
      <div class="grp"><label>Status</label>${statuses.map(s=>`<button class="fbtn ${statusFilter===s?'on':''}" data-st="${esc(s)}">${esc(s)}</button>`).join('')}</div>
    </div>
    <div class="cards">${slice.map(reportCard).join('')||'<div class="empty">No reports match this filter.</div>'}</div>
    ${pages>1?`<div class="pager"><button id="prev" ${page<=1?'disabled':''}>← Prev</button><span class="pinfo">Page ${page} of ${pages}</span><button id="next" ${page>=pages?'disabled':''}>Next →</button></div>`:''}

    <div class="shd"><h2>Additional threats detected</h2><span class="c">${detected.length}</span><span class="line"></span></div>
    ${detected.length?`<div class="detected">${detected.map(detectedRow).join('')}</div>`:'<div class="empty">No additional threats currently in the queue.</div>'}

    <footer>
      Each report relates many sources into one event, tiers them by reliability, reconciles conflicting claims, and records adjudicated false alarms.
      Detected threats graduate to full reports as they are verified and human-reviewed. Severity is AI-assigned and expert-reviewed (context-conditioned, per VISION §5).<br>
      Demo build — diagrams by ConceptViz · multi-source grounded harvest + fact-check · machine event-cards at <code>events/index.json</code> and <code>&lt;slug&gt;.json</code>.
    </footer>`;
  const sel=document.getElementById('sortSel'); if(sel) sel.onchange=()=>{sortKey=sel.value;page=1;render();};
  document.querySelectorAll('.fbtn').forEach(b=>b.onclick=()=>{statusFilter=b.dataset.st;page=1;render();});
  const pv=document.getElementById('prev'), nx=document.getElementById('next');
  if(pv) pv.onclick=()=>{if(page>1){page--;render();}};
  if(nx) nx.onclick=()=>{if(page<pages){page++;render();}};
}
fetch('events/index.json',{cache:'no-store'}).then(r=>r.json()).then(m=>{MODEL=m;render();})
  .catch(e=>{document.getElementById('app').innerHTML='<div class="wrap">Failed to load events index: '+esc(e.message)+'<br>(The feed reads <code>events/index.json</code> — it must be served, not opened via file://.)</div>';});
</script>
</body>
</html>
