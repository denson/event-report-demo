<style>

    --ink:#e6edf3; --mut:#9fb0c0; --accent:#4ea1ff; --warn:#ffb454; --good:#54d18c; --bad:#ff7b72;

  .summary{font-size:15.5px;color:#d6e2ee}

  .tlrow{display:grid;grid-template-columns:140px 1fr;gap:14px;padding:11px 0;border-top:1px solid var(--line)}
  .tlrow:first-child{border-top:0}
  .tldate{color:var(--accent);font-weight:600;font-size:13.5px}
  .tlbody{color:#d6e2ee;font-size:14px}
  .tlbody .src{color:var(--mut);font-size:12px}

  .filters button.on{background:var(--accent);color:#04121f;border-color:var(--accent);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:10px}

  .t-compromised-intermediary{border-left:3px solid #ffb454}
  .t-platform{border-left:3px solid #d2a8ff}
  .t-victim-org{border-left:3px solid #79c0ff}
  .t-attack-vector{border-left:3px solid #f778ba}
  .t-data-exposed{border-left:3px solid #54d1c8}

  .fb-h{background:#13301d;color:#7fdba0;border:1px solid #1f4a30}

  .mits{display:grid;gap:9px}
  .mit{display:flex;gap:11px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
  .mit .ic{color:var(--good);font-weight:700;flex:0 0 auto}
  .mit .mt{font-size:14px}.mit .mt b{color:#fff}
  footer{color:var(--mut);font-size:12px;margin-top:26px;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
  .backlink{display:inline-block;color:var(--mut);font-size:13px;text-decoration:none;margin-bottom:14px;border:1px solid var(--line);border-radius:7px;padding:4px 11px;background:var(--panel)}
  .backlink:hover{border-color:var(--accent);color:var(--accent)}
  .disclaimer{color:var(--mut);font-size:12.5px;font-style:italic;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin:16px 0}

  .review-banner{display:flex;gap:12px;align-items:flex-start;border-radius:10px;padding:13px 16px;margin:0 0 4px;font-size:13.5px}
  .review-banner.reviewed{background:#10261c;border:1px solid #1f4633;color:#cfe9d9}
  .review-banner.draft{background:#3a2a12;border:1px solid #5a4220;color:#ffd9a8}
  .review-banner .rb-ic{font-size:19px;line-height:1.15;flex:0 0 auto}
  .review-banner .rb-hd{font-weight:700;letter-spacing:.5px;font-size:12px;text-transform:uppercase}
  .review-banner.reviewed .rb-hd{color:var(--good)}
  .review-banner.draft .rb-hd{color:var(--warn)}
  .review-banner .rb-exp{margin-top:4px;color:#adbac7}
  .review-banner .rb-exp b{color:#cfe9d9}
  .review-banner .rb-note{margin-top:6px;color:#cdd9e5;border-left:2px solid #1f4633;padding-left:10px}
  /* severity — AI-assessed + expert POV */
  .sevpanel .sevrow{display:grid;grid-template-columns:auto auto 1fr;gap:12px;align-items:start;padding:10px 0;border-top:1px solid var(--line)}
  .sevpanel .sevrow:first-of-type{border-top:0}
  .sevwho{font-weight:600;font-size:13.5px;white-space:nowrap}
  .sevwho .sevexp{display:block;color:var(--mut);font-size:11.5px;font-weight:400;margin-top:2px;max-width:170px;white-space:normal}
  .sevtier{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-radius:5px;padding:3px 10px;height:fit-content;white-space:nowrap;text-align:center}
  .sev-low{background:#10331f;color:#54d18c;border:1px solid #1f5a36}
  .sev-medium{background:#3a2a12;color:#ffb454;border:1px solid #5a4220}
  .sev-high{background:#332316;color:#ffa657;border:1px solid #5e4220}
  .sev-critical{background:#3a1518;color:#ff7b72;border:1px solid #5a2024}
  .sevbasis{color:#cdd9e5;font-size:13px}
  .sevnote{color:var(--mut);font-size:12px;margin-top:10px;font-style:italic}
  @media(max-width:600px){.tlrow{grid-template-columns:1fr;gap:3px}}
</style>

    { name:"Cisco", disposition:"ruled out", confidence:"high",
      surfaced:"Named in the same coverage with a ShinyHunters threat to leak millions of Salesforce records, AWS buckets, and source code.",
      reason:"Hit via multiple non-Anodot vectors — UNC6040 voice phishing (vishing), Salesforce Aura harvesting, and a Trivy developer-tool supply-chain compromise. Same actor cluster, none of them Anodot." },
    { name:"TELUS / TELUS Digital", disposition:"ruled out", confidence:"high",
      surfaced:"A very large (reportedly ~1 PB) ShinyHunters breach with BigQuery data exfiltration, mentioned in the same Snowflake / warehouse coverage.",
      reason:"The access path was a 2025 Drift/Salesloft OAuth-token compromise → leaked GCP credentials → BigQuery (mined with TruffleHog) — NOT Anodot. A multi-hop credential chain, separate event." }
  ],

  mitigations: [
    { t:"<b>Revoke + rotate</b> all third-party integration OAuth tokens; treat long-lived integration tokens as crown jewels." },
    { t:"<b>Monitor integration query patterns</b> — exfiltration hid inside \"normal Anodot queries\"; baseline and alert on volume/shape anomalies from integration principals." },
    { t:"<b>Scope-down integration grants</b> — least-privilege per-warehouse, short-lived tokens." },
    { t:"<b>Platform-side containment</b> — Snowflake locked accounts referencing the compromised integration; Anodot force-shut all connectors globally." }
  ],

  provenance: "108 Google News RSS items (Snowflake security lanes, retrieved 2026-06-12) + grounded-search supplement. Reliability assessment is a first-pass tiering, not a finished bias model. Record counts and the attack-chain are corroborated across ≥3 specialist sources; the Salesforce-pivot claim is single-tier and marked medium."
};


/* ====================  RENDER  ==================== */
const TYPE_LABEL={"threat-actor":"threat actor","compromised-intermediary":"compromised intermediary","platform":"platform","victim-org":"victim org","attack-vector":"attack vector","data-exposed":"data exposed"};
let activeType=null;

function severityHtml(){
  const s=DATA.severity; if(!s) return '';
  const tcls=t=>'sev-'+String(t||'').toLowerCase();
  const row=(who,exp,tier,basis)=>`<div class="sevrow"><span class="sevwho">${esc(who)}${exp?`<span class="sevexp">${esc(exp)}</span>`:''}</span><span class="sevtier ${tcls(tier)}">${esc(tier||'—')}</span><span class="sevbasis">${esc(basis||'')}</span></div>`;
  let rows='';
  if(s.ai) rows+=row('AI-assessed','automated', s.ai.tier, s.ai.basis);
  (s.human||[]).forEach(h=> rows+=row('Expert review', `${h.reviewer||''}${h.expertise?' — '+h.expertise:''}`, h.tier, h.basis));
  return `<section class="sevpanel"><h2>Severity <span class="n">· AI-assessed + expert point-of-view</span></h2>${rows}${s.note?`<div class="sevnote">${esc(s.note)}</div>`:''}</section>`;
}
function reviewBannerHtml(){
  const r=DATA.review;
  if(!r||r.status==='draft'||r.status==='pending'){
    return `<div class="review-banner draft"><span class="rb-ic">⚠</span><div class="rb-body"><div class="rb-hd">Draft — pending human review</div><div class="rb-exp">Machine-assembled from multi-source harvest + automated fact-check. Not yet vetted by a human subject-matter expert.</div></div></div>`;
  }
  const who=[r.reviewer&&`<b>${esc(r.reviewer)}</b>`, r.date&&esc(r.date)].filter(Boolean).join(' · ');
  return `<div class="review-banner reviewed"><span class="rb-ic">✓</span><div class="rb-body">
      <div class="rb-hd">Human-reviewed${who?' · '+who:''}</div>
      ${r.expertise?`<div class="rb-exp"><b>Reviewer expertise:</b> ${esc(r.expertise)}</div>`:''}
      ${r.note?`<div class="rb-note">${r.note}</div>`:''}
    </div></div>`;
}
function diagramHtml(d){
  return `<figure class="viz">
    <img src="${esc(d.file)}" alt="${esc(d.title)}"
      onerror="this.outerHTML='<div class=&quot;vizmissing&quot;><div class=&quot;vm-t&quot;>${esc(d.title)}</div><div>ConceptViz diagram — drop the downloaded PNG at</div><code>${esc(d.file)}</code><div>(prompt: ${esc((DATA.event&&DATA.event.prompts_ref)||"references/ConceptViz_prompts.md")} · ${esc(d.id)})</div></div>'"/>
    <figcaption><b>${esc(d.title)}.</b> ${esc(d.caption)}</figcaption>
  </figure>`;
}
function timelineHtml(){
  return `<div class="tl">`+DATA.timeline.map(r=>`<div class="tlrow"><div class="tldate">${esc(r.date)}</div><div class="tlbody">${r.body}<div class="src">${esc(r.src)}</div></div></div>`).join('')+`</div>`;
}
function entitiesHtml(){
  const ents=DATA.entities;
  const present=[...new Set(ents.map(e=>e.type))];
  const shown=activeType?ents.filter(e=>e.type===activeType):ents;
  const filters=`<div class="filters"><button class="${activeType?'':'on'}" data-t="">all (${ents.length})</button>`+
    present.map(t=>`<button class="${activeType===t?'on':''}" data-t="${t}">${esc(TYPE_LABEL[t]||t)} (${ents.filter(e=>e.type===t).length})</button>`).join('')+`</div>`;
  const chips=shown.map(e=>`<div class="chip t-${esc(e.type)}">
      <div class="chiphd"><span class="ty">${esc(TYPE_LABEL[e.type]||e.type)}</span><b>${esc(e.name)}</b></div>
      ${e.role?`<div class="role">${esc(e.role)}</div>`:''}
      ${e.status&&e.status!=='—'?`<div class="status">⦿ ${esc(e.status)}</div>`:''}
    </div>`).join('');
  return filters+`<div class="chips">${chips}</div>`;
}
function relationshipsHtml(){
  const CAT=['causal','enabling','impact','lateral'];
  const rels=DATA.relationships;
  const present=[...CAT.filter(c=>rels.some(r=>r.category===c)),...[...new Set(rels.map(r=>r.category))].filter(c=>!CAT.includes(c))];
  return present.map(c=>{
    const items=rels.filter(r=>r.category===c);
    return `<div class="relcat"><div class="cathd c-${esc(c)}">${esc(c)} <span class="cn">${items.length}</span></div>`+
      items.map(r=>`<div class="rel"><div class="triple"><b>${esc(r.subject)}</b> <span class="relv">${esc(r.relation)}</span> <i>${esc(r.object)}</i><span class="conf cf-${esc(r.confidence)}">${esc(r.confidence)}</span></div>${r.rationale?`<div class="why">${esc(r.rationale)}</div>`:''}</div>`).join('')+`</div>`;
  }).join('');
}
function reliabilityHtml(){
  const rcls={'load-bearing':'rt-loadbearing','corroboration':'rt-corrob','reach only':'rt-reach'};
  return `<div class="reltable">`+DATA.reliability.map(t=>`<div class="rtier ${rcls[t.role]||''}">
      <div class="rt-hd"><b>${esc(t.tier)}</b><span class="fact-b ${t.fclass}">${esc(t.factuality)}</span><span class="rt-role">${esc(t.role)}</span></div>
      <div class="rt-out">${esc(t.outlets)}</div>
      <div class="why" style="color:var(--mut);font-size:12.5px;margin-top:6px">${esc(t.note)}</div>
    </div>`).join('')+`</div><div class="saturation">📡 <b>Source-saturation signal:</b> ${esc(DATA.saturation)}</div>`;
}
function conflictsHtml(){
  return DATA.conflicts.map(c=>`<div class="claim"><div class="ch">${esc(c.head)} <span class="vs">vs</span> ${esc(c.vs)}</div><div class="recon">${c.recon}</div></div>`).join('');
}
function relatedHtml(){
  return `<div class="related">`+DATA.related.map(r=>`<div class="relev"><b>${esc(r.title)}</b><span class="tag">${esc(r.tag)}</span><div class="rd">${r.body}</div></div>`).join('')+`</div>`;
}
function falseAlarmsHtml(){
  const fa=DATA.false_alarms||[];
  const intro=DATA.false_alarms_intro?`<div class="fa-intro">${DATA.false_alarms_intro}</div>`:'';
  return intro+fa.map(f=>`<div class="falsealarm">
      <div class="fah"><b>${esc(f.name)}</b><span class="ruled">${esc(f.disposition||"ruled out")}</span>${f.confidence?`<span class="conf cf-${esc(f.confidence)}">${esc(f.confidence)}</span>`:''}</div>
      ${f.surfaced?`<div class="farow"><span class="fak">Why it surfaced</span>${esc(f.surfaced)}</div>`:''}
      ${f.reason?`<div class="farow"><span class="fak">Why it's out</span>${esc(f.reason)}</div>`:''}
    </div>`).join('');
}
function mitigationsHtml(){
  return `<div class="mits">`+DATA.mitigations.map(m=>`<div class="mit"><span class="ic">✓</span><span class="mt">${m.t}</span></div>`).join('')+`</div>`;
}

function render(){
  const ev=DATA.event;
  document.title=ev.title?("Event Report — "+ev.title):"Event Report";
  document.getElementById('app').innerHTML=`
    <a href="${esc((DATA.event&&DATA.event.home_href)||'index.html')}" class="backlink">← All reports</a>
    <header>
      <div class="badge">${esc(ev.badge||"CYBER EVENT REPORT")}</div>
      <h1>${esc(ev.title)}</h1>
      <div class="meta">${esc(ev.date_range)}</div>
      <div class="factsheet">
        <div class="fact"><div class="k">First reported</div><div class="v">${esc(ev.first_reported)}</div></div>
        <div class="fact"><div class="k">Latest activity</div><div class="v">${esc(ev.latest_activity)}</div></div>
        <div class="fact"><div class="k">Status</div><div class="v active">${esc(ev.status)}</div></div>
        <div class="fact"><div class="k">Materiality</div><div class="v mixed">${esc(ev.materiality)}</div></div>
        <div class="fact"><div class="k">Confidence</div><div class="v high">${esc(ev.confidence)}</div></div>
      </div>
    </header>

    ${reviewBannerHtml()}
    ${severityHtml()}
    ${ev.disclaimer?`<div class="disclaimer">${ev.disclaimer}</div>`:''}

    <section><h2>Summary</h2>
      <div class="summary">${ev.summary}</div>
      ${diagramHtml(DATA.diagrams[0])}
    </section>

    <section><h2>Timeline <span class="n">· first report → latest disclosure</span></h2>${timelineHtml()}</section>

    <section><h2>Knowledge graph — entities <span class="n">· ${DATA.entities.length} nodes · ${[...new Set(DATA.entities.map(e=>e.type))].length} types · click a type to filter</span></h2>
      ${diagramHtml(DATA.diagrams[2])}
      <div id="entbox">${entitiesHtml()}</div>
    </section>

    <section><h2>Knowledge graph — relationships <span class="n">· ${DATA.relationships.length} edges</span></h2>${relationshipsHtml()}</section>

    <section><h2>Multi-source coverage + reliability <span class="n">· the relating layer — not dedup</span></h2>${reliabilityHtml()}</section>

    <section><h2>Conflicting claims, reconciled</h2>
      ${diagramHtml(DATA.diagrams[1])}
      ${conflictsHtml()}
    </section>

    <section><h2>Related / ongoing events <span class="n">· relate-to-prior — the agent's job</span></h2>${relatedHtml()}</section>

    ${(DATA.false_alarms&&DATA.false_alarms.length)?`<section><h2>False alarms — investigated &amp; ruled out <span class="n">· ${DATA.false_alarms.length} downgrades · knowing what's NOT in the event is first-class signal</span></h2>${falseAlarmsHtml()}</section>`:''}

    <section><h2>Mitigations / defender takeaways</h2>${mitigationsHtml()}</section>

    <footer><b>Provenance.</b> ${esc(DATA.provenance)}<br><br>
      Multi-source fusion: Google News RSS grounded harvest + grounded-search supplement · diagrams by ConceptViz · provenance is domain-level (live URLs re-found on demand).</footer>`;
}
function bindFilters(){
  document.querySelectorAll('#entbox .filters button').forEach(b=>b.onclick=()=>{
    activeType=b.dataset.t||null;
    document.getElementById('entbox').innerHTML=entitiesHtml();
    bindFilters();
  });
}
render();
bindFilters();

// ---- WebMCP: expose this event to an IN-BROWSER agent as typed tools (context-delivery, feature-detected) ----
// No-ops on browsers without navigator.modelContext (W3C incubation; Chrome origin-trial). The page never
// generates prose — it hands the calling agent the structured material so the agent can explain it.
(function(){
  if(typeof navigator==='undefined' || !navigator.modelContext || !navigator.modelContext.registerTool) return;
  const ev=DATA.event||{}, sev=DATA.severity||{}, rev=DATA.review||{};
  const plain=s=>String(s||'').replace(/<[^>]+>/g,'');
  const reg=t=>{try{navigator.modelContext.registerTool(t);}catch(e){}};
  reg({ name:'getEventReportCard',
    description:'Return the full structured event-report card for the cyber event on this page (event, entities, relationships, source reliability, conflicting claims, related events, adjudicated false alarms, severity, human review). The same machine data the human report renders from.',
    inputSchema:{type:'object',properties:{}},
    async execute(){ return DATA; } });
  reg({ name:'explainThisEvent',
    description:'Return concise talking points to brief a human on this event: what happened, the vector, confirmed victims, severity (AI + expert), how many adjacent incidents were ruled out as false alarms, and who reviewed it. Use these to explain; do not invent beyond them.',
    inputSchema:{type:'object',properties:{audience:{type:'string',description:'optional audience hint, e.g. "executive", "engineer"'}}},
    async execute(){ return {
      title:ev.title, date_range:ev.date_range, status:ev.status, summary:plain(ev.summary),
      severity_ai:sev.ai&&sev.ai.tier, severity_expert:(sev.human&&sev.human[0]&&sev.human[0].tier)||null,
      confirmed_victims:(DATA.entities||[]).filter(e=>e.type==='victim-org').map(e=>e.name),
      false_alarms_ruled_out:(DATA.false_alarms||[]).map(f=>f.name),
      reviewed_by: rev.status==='reviewed' ? rev.reviewer+' ('+rev.expertise+')' : 'pending human review',
      how_to_read:'Sources are tiered by reliability (load-bearing vs reach-only); false alarms are companies named in the same wave but hit by a DIFFERENT vector — not part of this event.'
    }; } });
  reg({ name:'getFalseAlarms',
    description:'Return the adjudicated false alarms for this event — companies that surfaced as candidates but were ruled out, with why they surfaced and their actual (different) vector. Knowing what is NOT part of the event is first-class signal.',
    inputSchema:{type:'object',properties:{}},
    async execute(){ return { intro:plain(DATA.false_alarms_intro), false_alarms:DATA.false_alarms||[] }; } });
})();
</script>
